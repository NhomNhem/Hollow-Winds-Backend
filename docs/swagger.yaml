basePath: /api/v1
definitions:
  models.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  models.APIResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/models.APIError'
      success:
        type: boolean
    type: object
  models.AdjustGoldRequest:
    properties:
      amount:
        description: Can be negative
        type: integer
      reason:
        minLength: 10
        type: string
    required:
    - amount
    - reason
    type: object
  models.AdjustGoldResponse:
    properties:
      action_id:
        type: string
      adjustment:
        type: integer
      new_balance:
        type: integer
      old_balance:
        type: integer
      reason:
        type: string
      user_id:
        type: string
    type: object
  models.AdminAction:
    properties:
      action_type:
        type: string
      admin_id:
        type: string
      created_at:
        type: string
      details:
        additionalProperties: {}
        type: object
      id:
        type: string
      ip_address:
        type: string
      target_user_id:
        type: string
    type: object
  models.AdminActionsResponse:
    properties:
      actions:
        items:
          $ref: '#/definitions/models.AdminAction'
        type: array
      page:
        type: integer
      per_page:
        type: integer
      total_count:
        type: integer
    type: object
  models.AuthRequest:
    properties:
      displayName:
        type: string
      playfabId:
        type: string
    required:
    - playfabId
    type: object
  models.AuthResponse:
    properties:
      expiresIn:
        description: seconds
        type: integer
      jwt:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.BanUserRequest:
    properties:
      banned_until:
        description: NULL = permanent
        type: string
      reason:
        minLength: 10
        type: string
    required:
    - reason
    type: object
  models.BanUserResponse:
    properties:
      ban_id:
        type: string
      banned_until:
        type: string
      is_permanent:
        type: boolean
      reason:
        type: string
      user_id:
        type: string
    type: object
  models.ExportUserDataResponse:
    properties:
      ban_history:
        items:
          $ref: '#/definitions/models.UserBan'
        type: array
      exported_at:
        type: string
      level_completions:
        items:
          additionalProperties: {}
          type: object
        type: array
      talents:
        items:
          additionalProperties: {}
          type: object
        type: array
      user:
        $ref: '#/definitions/models.UserProfile'
    type: object
  models.GlobalLeaderboardResponse:
    properties:
      leaderboard:
        items:
          $ref: '#/definitions/models.LeaderboardEntry'
        type: array
      page:
        type: integer
      perPage:
        type: integer
      total:
        type: integer
    type: object
  models.LeaderboardEntry:
    properties:
      bestTime:
        type: number
      displayName:
        type: string
      firstCompleted:
        type: string
      levelsCompleted:
        type: integer
      maxMapUnlocked:
        type: integer
      playCount:
        type: integer
      playerId:
        type: string
      rank:
        type: integer
      stars:
        type: integer
      totalStars:
        type: integer
    type: object
  models.LevelCompletionRequest:
    properties:
      counterCount:
        minimum: 0
        type: integer
      dashCount:
        minimum: 0
        type: integer
      finalHp:
        minimum: 0
        type: number
      levelId:
        type: string
      mapId:
        type: string
      timeSeconds:
        type: number
      vulnerableKills:
        minimum: 0
        type: integer
    required:
    - finalHp
    - levelId
    - mapId
    - timeSeconds
    type: object
  models.LevelCompletionResponse:
    properties:
      goldEarned:
        type: integer
      isFirstCompletion:
        type: boolean
      mapUnlocked:
        type: string
      newBestTime:
        type: boolean
      newTotalGold:
        type: integer
      newTotalStars:
        type: integer
      nextLevelUnlocked:
        type: string
      starsEarned:
        type: integer
      success:
        type: boolean
    type: object
  models.LevelLeaderboardResponse:
    properties:
      leaderboard:
        items:
          $ref: '#/definitions/models.LeaderboardEntry'
        type: array
      levelId:
        type: string
      mapId:
        type: string
      total:
        type: integer
    type: object
  models.LevelStatsResponse:
    properties:
      averageStars:
        type: number
      averageTime:
        type: number
      bestTime:
        type: number
      completionRate:
        type: number
      levelId:
        type: string
      mapId:
        type: string
      totalPlays:
        type: integer
      uniquePlayers:
        type: integer
    type: object
  models.PlayerStatsResponse:
    properties:
      averageStars:
        type: number
      displayName:
        type: string
      globalRank:
        type: integer
      levelsCompleted:
        type: integer
      maxMapUnlocked:
        type: integer
      playerId:
        type: string
      totalStars:
        type: integer
    type: object
  models.SystemStatsResponse:
    properties:
      active_this_month:
        type: integer
      active_this_week:
        type: integer
      active_today:
        type: integer
      admin_actions_today:
        type: integer
      banned_users:
        type: integer
      last_updated:
        type: string
      levels_completed:
        type: integer
      total_gold_in_game:
        type: integer
      total_stars_earned:
        type: integer
      total_users:
        type: integer
    type: object
  models.TalentUpgradeRequest:
    properties:
      talentId:
        type: string
    required:
    - talentId
    type: object
  models.TalentUpgradeResponse:
    properties:
      goldSpent:
        type: integer
      newLevel:
        type: integer
      newTotalGold:
        type: integer
      nextLevelCost:
        type: integer
      statBonus:
        description: e.g., "+5% HP", "+3% Damage"
        type: string
      success:
        type: boolean
      talentId:
        type: string
    type: object
  models.UnbanUserRequest:
    properties:
      reason:
        type: string
    required:
    - reason
    type: object
  models.UnbanUserResponse:
    properties:
      unban_reason:
        type: string
      unbanned_at:
        type: string
      user_id:
        type: string
    type: object
  models.User:
    properties:
      banReason:
        type: string
      bannedAt:
        type: string
      createdAt:
        description: Metadata
        type: string
      deletedAt:
        description: GDPR
        type: string
      diamonds:
        type: integer
      displayName:
        type: string
      facebookId:
        description: Social
        type: string
      gold:
        description: Currency
        type: integer
      googleId:
        type: string
      id:
        type: string
      isBanned:
        description: Flags
        type: boolean
      lastLoginAt:
        type: string
      lastPlayedAt:
        type: string
      maxMapUnlocked:
        description: Progression
        type: integer
      playfabId:
        type: string
      totalPlayTimeSeconds:
        type: integer
      totalStarsCollected:
        type: integer
    type: object
  models.UserBan:
    properties:
      banned_by:
        type: string
      banned_until:
        description: NULL = permanent
        type: string
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      reason:
        type: string
      unban_reason:
        type: string
      unbanned_at:
        type: string
      unbanned_by:
        type: string
      user_id:
        type: string
    type: object
  models.UserProfile:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_admin:
        type: boolean
      is_banned:
        type: boolean
      last_login_at:
        type: string
      levels_completed:
        type: integer
      playfab_id:
        type: string
      total_gold:
        type: integer
      total_stars:
        type: integer
      username:
        type: string
    type: object
  models.UserSearchResponse:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total_count:
        type: integer
      users:
        items:
          $ref: '#/definitions/models.UserProfile'
        type: array
    type: object
  models.UserTalent:
    properties:
      currentLevel:
        type: integer
      id:
        type: string
      talentId:
        type: string
      upgradedAt:
        type: string
      userId:
        type: string
    type: object
host: gamefeel-backend.fly.dev
info:
  contact:
    email: support@gamefeel.com
    name: API Support
  description: Game backend API với PlayFab integration, anti-cheat validation, và
    talent system
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: GameFeel Backend API
  version: "1.0"
paths:
  /admin/actions:
    get:
      description: Get audit log of all admin actions (admin only)
      parameters:
      - default: Bearer
        description: Bearer JWT token
        in: header
        name: Authorization
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Results per page (max 100)
        in: query
        name: perPage
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Admin actions
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.AdminActionsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "403":
          description: Forbidden - Admin only
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/models.APIError'
              type: object
      security:
      - BearerAuth: []
      summary: Get admin actions log
      tags:
      - Admin
  /admin/stats/overview:
    get:
      description: Get system overview statistics (admin only)
      parameters:
      - default: Bearer
        description: Bearer JWT token
